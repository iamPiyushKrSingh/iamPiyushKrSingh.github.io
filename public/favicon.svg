<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#logo-gradient)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a1a1aa" />
      <stop offset="100%" stop-color="#d4d4d4" />
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="10s" repeatCount="indefinite" />
    <circle cx="12" cy="12" r="2.5" />
    <ellipse rx="10" ry="3.5" cx="12" cy="12" transform="rotate(30 12 12)" />
    <ellipse rx="10" ry="3.5" cx="12" cy="12" transform="rotate(90 12 12)" />
    <ellipse rx="10" ry="3.5" cx="12" cy="12" transform="rotate(150 12 12)" />
  </g>
</svg>
